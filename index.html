<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個人作品集</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gray: {
              50: '#fafafa',
              100: '#f5f5f5',
              200: '#e5e5e5',
              300: '#d4d4d4',
              400: '#a3a3a3',
              500: '#737373',
              600: '#525252',
              700: '#404040',
              800: '#262626',
              900: '#171717',
            }
          }
        }
      }
    }
  </script>

  <!-- i18next & React dependencies -->
  <script src="https://unpkg.com/i18next@23.11.2/dist/umd/i18next.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-i18next@14.1.1/react-i18next.min.js"></script>

  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- React Router v6 -->
  <script src="https://unpkg.com/@remix-run/router@1.16.1/dist/router.umd.min.js"></script>
  <script src="https://unpkg.com/react-router@6.23.1/dist/umd/react-router.production.min.js"></script>
  <script src="https://unpkg.com/react-router-dom@6.23.1/dist/umd/react-router-dom.production.min.js"></script>

  <!-- Framer Motion -->
  <script src="https://unpkg.com/framer-motion@11.1.9/dist/framer-motion.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Load Data -->
  <script src="./data.js"></script>

</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">
  <div id="root"></div>

  <!-- App Logic -->
  <script type="text/babel">
    const { useState, useEffect } = React;
    const { HashRouter, Routes, Route, Link, Outlet, useLocation } = ReactRouterDOM;
    const { useTranslation, initReactI18next } = ReactI18next;

    // --- 1. i18next 初始化 ---
    i18next
      .use(initReactI18next)
      .init({
        resources: {
          zh: { translation: window.PortfolioData.locales.zh },
          en: { translation: window.PortfolioData.locales.en }
        },
        lng: "zh",
        fallbackLng: "zh",
        interpolation: { escapeValue: false }
      });

    // --- 2. 共用組件 (Components) ---

    // 導覽列 Navbar
    const Navbar = () => {
      const { t, i18n } = useTranslation();
      const location = useLocation();

      const toggleLang = () => {
        i18n.changeLanguage(i18n.language === 'zh' ? 'en' : 'zh');
      };

      const navItems = [
        { path: '/', label: t('nav.home') },
        { path: '/about', label: t('nav.about') },
        { path: '/resources', label: t('nav.resources') },
        { path: '/blog', label: t('nav.blog') }
      ];

      return (
        <nav className="sticky top-0 z-50 bg-white border-b border-gray-200">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex justify-between items-center h-16">
              <div className="flex-shrink-0 flex items-center">
                <Link to="/" className="text-xl font-bold tracking-tight text-gray-900">
                  伊理教育實驗室
                </Link>
              </div>
              <div className="hidden md:flex space-x-8 items-center">
                {navItems.map((item) => (
                  <Link
                    key={item.path}
                    to={item.path}
                    className={`inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium transition-colors ${
                      location.pathname === item.path
                        ? 'border-gray-900 text-gray-900'
                        : 'border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700'
                    }`}
                  >
                    {item.label}
                  </Link>
                ))}
                <button
                  onClick={toggleLang}
                  className="ml-4 px-3 py-1 text-sm border border-gray-300 rounded-md text-gray-700 hover:bg-gray-100 transition-colors"
                >
                  {t('common.switchLang')}
                </button>
              </div>
            </div>
          </div>
        </nav>
      );
    };

    // 版型 Layout
    const Layout = () => {
      return (
        <div className="min-h-screen flex flex-col">
          <Navbar />
          <main className="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
            <Outlet />
          </main>
          <footer className="bg-white border-t border-gray-200 mt-auto">
            <div className="max-w-7xl mx-auto py-10 px-4 sm:px-6 lg:px-8">
              <div className="flex flex-col md:flex-row justify-between items-center md:items-end mb-8 border-b border-gray-100 pb-8">
                <div className="mb-6 md:mb-0 text-center md:text-left">
                  <h2 className="text-2xl font-bold text-gray-900 mb-2 tracking-tight">Yvo Wagian</h2>
                  <p className="text-gray-500 font-medium">Learning Experience Designer</p>
                </div>
                <div className="flex flex-col sm:flex-row gap-4 items-center">
                  <a href="mailto:yvo.wagian.huang@gmail.com" className="text-gray-500 hover:text-gray-900 flex items-center transition-colors group px-4 py-2 bg-gray-50 rounded-lg hover:bg-gray-100">
                    <i data-lucide="mail" className="w-5 h-5 mr-2 text-gray-400 group-hover:text-gray-900 transition-colors"></i>
                    <span className="text-sm font-medium">Email</span>
                  </a>
                  <a href="https://linkedin.com/in/yvo-wagian-1545b23a5" target="_blank" className="text-gray-500 hover:text-blue-600 flex items-center transition-colors group px-4 py-2 bg-gray-50 rounded-lg hover:bg-blue-50">
                    <i data-lucide="linkedin" className="w-5 h-5 mr-2 text-gray-400 group-hover:text-blue-600 transition-colors"></i>
                    <span className="text-sm font-medium">LinkedIn</span>
                  </a>
                </div>
              </div>
              <p className="text-center text-sm text-gray-400 font-medium tracking-wide">
                &copy; 2026 Yvo Wagian. All rights reserved.
              </p>
            </div>
          </footer>
        </div>
      );
    };

    // --- 3. 頁面 (Pages) ---

    const Home = () => {
      const { t, i18n } = useTranslation();
      const lang = i18n.language;
      const { posts, testimonials, featuredAnnouncement, featuredProject, gamificationPhilosophy } = window.PortfolioData;
      
      const getText = (obj) => typeof obj === 'string' ? obj : (obj[lang] || obj.zh);

      return (
        <div className="space-y-20 py-8">
          {/* Hero Section */}
          <section className="text-center py-16">
            <h1 className="text-4xl font-extrabold tracking-tight text-gray-900 sm:text-5xl md:text-6xl">
              {t('home.title')}
            </h1>
          </section>

          {/* Featured Announcement */}
          {featuredAnnouncement && (
            <section className="max-w-4xl mx-auto">
              <div className="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden group hover:shadow-xl transition-shadow duration-300">
                <div className="h-64 sm:h-80 w-full overflow-hidden relative">
                  <img src={featuredAnnouncement.imageUrl} alt="Featured" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700 ease-in-out" />
                  <div className="absolute inset-0 bg-gradient-to-t from-gray-900/80 to-transparent"></div>
                  <div className="absolute bottom-0 left-0 p-6 sm:p-8">
                    <span className="inline-block px-3 py-1 bg-blue-600 text-white text-xs font-bold rounded-full mb-3 uppercase tracking-wider">Featured</span>
                    <h2 className="text-2xl sm:text-3xl font-bold text-white mb-2">{featuredAnnouncement.title[lang] || featuredAnnouncement.title.zh}</h2>
                  </div>
                </div>
                <div className="p-6 sm:p-8 bg-white">
                  <p className="text-gray-700 text-lg leading-relaxed">{featuredAnnouncement.description[lang] || featuredAnnouncement.description.zh}</p>
                </div>
              </div>
            </section>
          )}

          {/* Gamification Philosophy */}
          {gamificationPhilosophy && (
            <section className="max-w-4xl mx-auto px-4 text-center">
              <div className="inline-flex items-center justify-center p-3 bg-purple-100 rounded-2xl mb-6">
                <i data-lucide="gamepad-2" className="w-8 h-8 text-purple-600"></i>
              </div>
              <h2 className="text-3xl sm:text-4xl font-extrabold text-gray-900 mb-6 leading-tight">
                {gamificationPhilosophy.title[lang] || gamificationPhilosophy.title.zh}
              </h2>
              <p className="text-lg text-gray-600 leading-relaxed max-w-3xl mx-auto">
                {gamificationPhilosophy.description[lang] || gamificationPhilosophy.description.zh}
              </p>
            </section>
          )}

          {/* Featured Project */}
          {featuredProject && (
            <section className="max-w-5xl mx-auto">
              <div className="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden flex flex-col md:flex-row items-center gap-8 p-8 md:p-12">
                <div className="w-full md:w-1/2">
                  <img src={featuredProject.imageUrl} alt="Featured Project" className="w-full h-auto rounded-2xl shadow-md transform -rotate-1 hover:rotate-0 transition-transform duration-500" />
                </div>
                <div className="w-full md:w-1/2 flex flex-col items-start">
                  <span className="inline-block px-4 py-1.5 bg-gradient-to-r from-purple-500 to-indigo-500 text-white text-sm font-extrabold rounded-full mb-6 uppercase tracking-widest shadow-sm">Project Spotlight</span>
                  <h2 className="text-3xl sm:text-4xl font-extrabold text-gray-900 mb-6 leading-tight">{featuredProject.title[lang] || featuredProject.title.zh}</h2>
                  <p className="text-gray-600 text-lg leading-relaxed mb-8">{featuredProject.description[lang] || featuredProject.description.zh}</p>
                  
                  <div className="w-full space-y-4">
                    {featuredProject.documents.map((doc, idx) => (
                      <a key={idx} href={doc.url} target="_blank" rel="noopener noreferrer" className="flex items-center justify-between px-6 py-4 bg-gray-50 rounded-xl border border-gray-200 hover:border-indigo-300 hover:bg-indigo-50 transition-colors group">
                        <div className="flex items-center text-gray-800 font-bold group-hover:text-indigo-700 transition-colors">
                          <i data-lucide="lock" className="w-5 h-5 mr-3 text-indigo-500"></i>
                          {doc.name}
                        </div>
                        <i data-lucide="download" className="w-5 h-5 text-gray-400 group-hover:text-indigo-600 transition-colors"></i>
                      </a>
                    ))}
                  </div>
                </div>
              </div>
            </section>
          )}

          {/* Announcements */}
          <section className="max-w-4xl mx-auto">
            <h2 className="text-2xl font-bold mb-8 text-gray-900 flex items-center">
              <i data-lucide="bell" className="w-6 h-6 mr-3 text-blue-500"></i>
              {t('home.announcements')}
            </h2>
            <div className="grid gap-6">
              {posts.slice(0, 3).map(post => (
                <div key={post.id} className="group bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-lg hover:border-blue-100 transition-all duration-300 relative overflow-hidden">
                  <div className="absolute left-0 top-0 bottom-0 w-1 bg-blue-500 transform origin-bottom scale-y-0 group-hover:scale-y-100 transition-transform duration-300"></div>
                  <Link to={`/blog/${post.id}`}>
                    <h3 className="text-xl font-bold text-gray-900 mb-2 group-hover:text-blue-600 transition-colors">{post.title}</h3>
                    <p className="text-sm text-gray-400 mb-3 font-medium">{post.date}</p>
                    <p className="text-gray-600 leading-relaxed">{post.excerpt}</p>
                  </Link>
                </div>
              ))}
            </div>
          </section>

          {/* Testimonials (Slide Wall Concept) */}
          <section className="max-w-6xl mx-auto">
            <h2 className="text-2xl font-bold mb-8 text-gray-900 flex items-center px-4 sm:px-0">
              <i data-lucide="message-square" className="w-6 h-6 mr-3 text-purple-500"></i>
              {t('home.testimonials')}
            </h2>
            <div className="flex overflow-x-auto space-x-6 pb-8 snap-x px-4 sm:px-0 hide-scrollbar" style={{ scrollbarWidth: 'none', msOverflowStyle: 'none' }}>
              {testimonials.map(item => (
                <div key={item.id} className="snap-center shrink-0 w-80 bg-gradient-to-br from-gray-900 to-gray-800 text-white p-8 rounded-2xl shadow-xl transform transition duration-300 hover:-translate-y-2">
                  <i data-lucide="quote" className="w-8 h-8 text-gray-600 mb-4 opacity-50"></i>
                  <p className="italic mb-6 text-gray-200 leading-relaxed">"{getText(item.content)}"</p>
                  <div className="flex items-center">
                    <div className="w-10 h-10 rounded-full bg-gradient-to-r from-purple-400 to-blue-400 flex items-center justify-center font-bold text-gray-900">
                      {getText(item.name).charAt(0)}
                    </div>
                    <p className="ml-4 text-gray-300 font-medium">{getText(item.name)}</p>
                  </div>
                </div>
              ))}
            </div>
            <style>
              {`
                .hide-scrollbar::-webkit-scrollbar {
                  display: none;
                }
              `}
            </style>
          </section>
        </div>
      );
    };

    const About = () => {
      const { i18n } = useTranslation();
      const lang = i18n.language;
      const { about } = window.PortfolioData;
      
      const role = typeof about.role === 'string' ? about.role : (about.role[lang] || about.role.zh);
      const bio = typeof about.bio === 'string' ? about.bio : (about.bio[lang] || about.bio.zh);

      return (
        <div className="max-w-4xl mx-auto flex flex-col md:flex-row items-start gap-16 py-16 px-4">
          <div className="w-48 h-48 md:w-64 md:h-64 shrink-0">
            <img src={about.avatarUrl} alt={about.name} className="w-full h-full object-cover rounded-2xl shadow-sm border border-gray-200" />
          </div>
          <div className="flex-1">
            <h1 className="text-4xl font-extrabold text-gray-900 mb-2 tracking-tight">{about.name}</h1>
            <h2 className="text-xl text-gray-500 font-medium mb-8 pb-4 border-b border-gray-100">{role}</h2>
            <div className="prose prose-gray text-gray-700 leading-relaxed text-lg space-y-6">
              {bio.split('\n').map((paragraph, index) => (
                <p key={index}>{paragraph}</p>
              ))}
            </div>
            
            <div className="mt-12 pt-8 border-t border-gray-100">
              <h3 className="text-sm font-bold text-gray-400 uppercase tracking-wider mb-6">
                {lang === 'zh' ? '聯絡我 (預約課程・演講邀約・教材合作)' : 'Contact Me (Courses・Speaking・Materials)'}
              </h3>
              <div className="flex flex-wrap gap-4">
                <a href="mailto:yvo.wagian.huang@gmail.com" className="inline-flex items-center px-6 py-3 bg-gray-900 text-white font-medium rounded-xl hover:bg-gray-800 hover:shadow-md transition-all">
                  <i data-lucide="mail" className="w-5 h-5 mr-3"></i>
                  yvo.wagian.huang@gmail.com
                </a>
                <a href="https://linkedin.com/in/yvo-wagian-1545b23a5" target="_blank" className="inline-flex items-center px-6 py-3 bg-white text-gray-700 border border-gray-200 font-medium rounded-xl hover:bg-gray-50 hover:text-blue-600 hover:border-blue-200 transition-all shadow-sm">
                  <i data-lucide="linkedin" className="w-5 h-5 mr-3 text-blue-600"></i>
                  LinkedIn
                </a>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const Resources = () => {
      const { t } = useTranslation();
      const { resources } = window.PortfolioData;
      return (
        <div className="max-w-6xl mx-auto py-8">
          <div className="flex items-center mb-10">
            <i data-lucide="book-open" className="w-8 h-8 mr-4 text-blue-600"></i>
            <h1 className="text-4xl font-extrabold text-gray-900 tracking-tight">{t('nav.resources')}</h1>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
            {resources.map(res => (
              <div key={res.id} className="group bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 flex flex-col">
                <div className="h-56 overflow-hidden relative">
                  <div className="absolute inset-0 bg-gray-900 opacity-0 group-hover:opacity-10 transition-opacity z-10 duration-300"></div>
                  <img src={res.thumbnail} alt={res.title} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700 ease-in-out" />
                  <div className="absolute top-4 right-4 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full text-xs font-bold text-gray-700 shadow-sm z-20">{res.tag || "PDF"}</div>
                </div>
                <div className="p-8 flex flex-col flex-grow">
                  <h3 className="text-2xl font-bold text-gray-900 mb-3 group-hover:text-blue-600 transition-colors">{res.title}</h3>
                  <p className="text-gray-600 mb-8 leading-relaxed flex-grow">{res.description}</p>
                  <a href={res.url || res.pdfUrl} target="_blank" rel="noopener noreferrer" className="mt-auto w-full inline-flex items-center justify-center px-6 py-3 bg-blue-600 text-white text-sm font-semibold rounded-xl hover:bg-blue-700 hover:shadow-lg hover:shadow-blue-200 transition-all duration-300 transform active:scale-95">
                    <i data-lucide={res.icon || "download"} className="w-5 h-5 mr-2"></i> {res.buttonText || t('common.downloadPdf')}
                  </a>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const BlogList = () => {
      const { t } = useTranslation();
      const { posts } = window.PortfolioData;
      const [currentPage, setCurrentPage] = useState(1);
      const postsPerPage = 3;
      
      const indexOfLastPost = currentPage * postsPerPage;
      const indexOfFirstPost = indexOfLastPost - postsPerPage;
      const currentPosts = posts.slice(indexOfFirstPost, indexOfLastPost);
      const totalPages = Math.ceil(posts.length / postsPerPage);

      return (
        <div className="max-w-3xl mx-auto py-8">
          <div className="flex items-center mb-10 border-b border-gray-200 pb-6">
            <i data-lucide="file-text" className="w-8 h-8 mr-4 text-gray-800"></i>
            <h1 className="text-4xl font-extrabold text-gray-900 tracking-tight">{t('nav.blog')}</h1>
          </div>
          <div className="space-y-10">
            {currentPosts.map(post => (
              <article key={post.id} className="group cursor-pointer flex flex-col md:flex-row gap-8 items-start">
                {post.imageUrl && (
                  <div className="w-full md:w-1/3 shrink-0 rounded-2xl overflow-hidden shadow-sm">
                     <img src={post.imageUrl} alt={post.title} className="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-500" />
                  </div>
                )}
                <div className="flex-1">
                  <p className="text-sm text-gray-400 mb-2 font-medium tracking-wide uppercase">{post.date}</p>
                  <h2 className="text-3xl font-bold text-gray-900 mb-4 group-hover:text-blue-600 transition-colors">
                    <Link to={`/blog/${post.id}`}>{post.title}</Link>
                  </h2>
                  <p className="text-gray-600 mb-5 leading-relaxed text-lg">{post.excerpt}</p>
                  <Link to={`/blog/${post.id}`} className="inline-flex items-center text-sm font-bold text-blue-600 hover:text-blue-800 transition-colors">
                    {t('common.readMore')} <i data-lucide="arrow-right" className="w-4 h-4 ml-1 transform group-hover:translate-x-1 transition-transform"></i>
                  </Link>
                </div>
              </article>
            ))}
          </div>
          
          {/* Pagination */}
          {totalPages > 1 && (
            <div className="mt-16 pt-8 border-t border-gray-200 flex justify-between items-center">
              <button 
                onClick={() => setCurrentPage(p => Math.max(1, p - 1))}
                disabled={currentPage === 1}
                className={`flex items-center px-4 py-2 rounded-lg font-medium transition-colors ${currentPage === 1 ? 'text-gray-400 cursor-not-allowed' : 'text-gray-700 hover:bg-gray-100'}`}
              >
                <i data-lucide="chevron-left" className="w-5 h-5 mr-1"></i> 上一頁
              </button>
              <span className="text-sm text-gray-500 font-medium">Page {currentPage} of {totalPages}</span>
              <button 
                onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))}
                disabled={currentPage === totalPages}
                className={`flex items-center px-4 py-2 rounded-lg font-medium transition-colors ${currentPage === totalPages ? 'text-gray-400 cursor-not-allowed' : 'text-gray-700 hover:bg-gray-100'}`}
              >
                下一頁 <i data-lucide="chevron-right" className="w-5 h-5 ml-1"></i>
              </button>
            </div>
          )}
        </div>
      );
    };

    const BlogPost = () => {
      const { id } = ReactRouterDOM.useParams();
      const { posts } = window.PortfolioData;
      const currentIndex = posts.findIndex(p => p.id === parseInt(id));
      const post = posts[currentIndex];

      if (!post) return <div className="text-center py-20 text-gray-500">Post not found</div>;

      const prevPost = currentIndex > 0 ? posts[currentIndex - 1] : null;
      const nextPost = currentIndex < posts.length - 1 ? posts[currentIndex + 1] : null;

      return (
        <article className="max-w-3xl mx-auto py-12">
          <Link to="/blog" className="inline-flex items-center text-sm font-medium text-gray-500 hover:text-gray-900 mb-10 transition-colors">
            <i data-lucide="arrow-left" className="w-4 h-4 mr-2"></i> 返回公告欄
          </Link>
          <header className="mb-10 pb-10 border-b border-gray-100">
            <p className="text-sm text-blue-600 font-bold tracking-widest uppercase mb-3">{post.date}</p>
            <h1 className="text-4xl sm:text-5xl font-extrabold text-gray-900 leading-tight mb-6">{post.title}</h1>
          </header>
          {post.imageUrl && (
            <div className="mb-12 rounded-3xl overflow-hidden shadow-sm border border-gray-100">
              <img src={post.imageUrl} alt={post.title} className="w-full h-auto max-h-[500px] object-cover" />
            </div>
          )}
          <div className="prose prose-lg prose-blue max-w-none text-gray-700 leading-loose">
            {post.content.split('\n').map((para, i) => (
              para.trim() ? <div key={i} className="mb-4" dangerouslySetInnerHTML={{ __html: para }} /> : <br key={i} />
            ))}
          </div>
          
          {/* Post Navigation */}
          <div className="mt-16 pt-8 border-t border-gray-200 grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div>
              {prevPost && (
                <Link to={`/blog/${prevPost.id}`} className="group block p-6 rounded-2xl border border-gray-100 hover:border-blue-200 hover:shadow-md transition-all text-left">
                  <span className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 block">上一篇</span>
                  <span className="text-lg font-bold text-gray-900 group-hover:text-blue-600 transition-colors flex items-center">
                    <i data-lucide="arrow-left" className="w-4 h-4 mr-2 transform group-hover:-translate-x-1 transition-transform"></i>
                    {prevPost.title}
                  </span>
                </Link>
              )}
            </div>
            <div className="text-right">
              {nextPost && (
                <Link to={`/blog/${nextPost.id}`} className="group block p-6 rounded-2xl border border-gray-100 hover:border-blue-200 hover:shadow-md transition-all text-right flex flex-col items-end">
                  <span className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 block">下一篇</span>
                  <span className="text-lg font-bold text-gray-900 group-hover:text-blue-600 transition-colors flex items-center justify-end">
                    {nextPost.title}
                    <i data-lucide="arrow-right" className="w-4 h-4 ml-2 transform group-hover:translate-x-1 transition-transform"></i>
                  </span>
                </Link>
              )}
            </div>
          </div>
        </article>
      );
    };

    // --- 4. 應用程式入口 (App) ---
    const App = () => {
      // Initialize Lucide icons on route change or initial render
      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      });

      return (
        <HashRouter>
          <Routes>
            <Route path="/" element={<Layout />}>
              <Route index element={<Home />} />
              <Route path="about" element={<About />} />
              <Route path="resources" element={<Resources />} />
              <Route path="blog" element={<BlogList />} />
              <Route path="blog/:id" element={<BlogPost />} />
            </Route>
          </Routes>
        </HashRouter>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
