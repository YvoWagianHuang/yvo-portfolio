<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三隻小豬搶答系統</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --danger-color: #E74C3C;
            --bg-color: #F5F7FA;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* === 準備區設定 === */
        #setup-section {
            width: 100%;
            max-width: 900px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        textarea {
            width: 100%;
            height: 350px;
            font-size: 16px;
            padding: 15px;
            border: 2px solid #BDC3C7;
            border-radius: 8px;
            resize: vertical;
            box-sizing: border-box;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .start-btn {
            background-color: #27ae60;
            color: white;
            width: 100%;
            font-size: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .start-btn:hover { opacity: 0.9; transform: scale(1.01); }

        /* === 遊戲區設定 === */
        #quiz-section {
            display: none; 
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        
        /* 控制列與生命值 */
        .top-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            max-width: 1200px;
            margin-bottom: 20px;
            background: white;
            padding: 15px 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }
        
        .health-container {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }
        .health-display {
            font-size: 30px;
            letter-spacing: 5px;
        }
        .icon-btn {
            background-color: #ecf0f1;
            color: #333;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            padding: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            cursor: pointer;
            border: none;
        }
        .icon-btn:hover { background-color: #bdc3c7; }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: var(--primary-color);
            color: white;
            margin: 0 5px;
            transition: 0.2s;
        }
        button:hover { opacity: 0.8; }
        .btn-active { background-color: #2C3E50; box-shadow: inset 0 3px 5px rgba(0,0,0,0.2); }
        
        .main-container {
            display: flex;
            width: 90%;
            max-width: 1200px;
            gap: 30px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        
        /* 題目顯示區 */
        .question-box { flex: 2; display: flex; flex-direction: column; }
        .question-text {
            /* 使用 clamp 讓字體可以動態縮放，避免 PBL 長題目爆框 */
            font-size: clamp(24px, 3.5vw, 42px);
            font-weight: bold;
            color: #2C3E50;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border: 3px dashed #BDC3C7;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 20px;
            background-color: #f9fbfd;
        }

        /* 計時器與三隻小豬區 */
        .timer-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #ecf0f1;
            border-radius: 10px;
            padding: 20px;
        }
        .houses {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 50px;
            margin-bottom: 15px;
        }
        .progress-container {
            width: 100%;
            height: 30px;
            background-color: #ddd;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--primary-color);
            transition: width 1s linear, background-color 0.5s;
        }
        .time-display {
            font-size: 32px;
            font-weight: bold;
            margin-top: 15px;
            color: var(--danger-color);
        }
        .wolf-status {
            font-size: 24px;
            margin-top: 10px;
            color: #555;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="setup-section">
        <h2>📝 課前準備：題庫已為您載入！</h2>
        <p>老師，我已經幫您把所有階段的題目整理好放入下方，您可以隨時修改，確認無誤後點擊下方按鈕即可開始。</p>
        <textarea id="question-input">I am the Big Bad Wolf! Tell me, who builds the straw house? 
What does the lazy pig buy with his money? 
Is the straw house expensive? 
Who builds the stick house? 
What does the busy pig buy to drink? 
Who is the smartest pig?
What does the smart pig build? 
What kind of food does the third pig buy?
Is the brick house cheap?
When I blow the brick house, are the pigs safe? 
【個人題】Wolf: "Agent Cindy! I want to drink something sweet! Give me one word from your list!" 
【個人題】Wolf: "President Sophie! The stick house is cheap, SO it is strong. Fix my grammar logic!(邏輯）"  
【個人題】Wolf: "Agent Cindy! How do you say '脆弱的' in English? Quick!" 
【個人題】Wolf: "Captain Toby! The smart pig is the FIRST brother, right?"  
【個人題】Wolf: "Agent Cindy! The brick house is cheap and dangerous! Say the opposite words!" (說出相反詞！) 
【個人題】Wolf: "President Sophie! Tell me what happens at the end of the story. Start with the right word!" (用正確的轉折詞開頭告訴我結局！) 
【個人題】Wolf: "Captain Toby! Connect these two: First pig is lazy. Third pig is smart." 
【個人題】Wolf: "Agent Cindy! What is the verb(動詞） for making a house fall down?" 
【進階合作】大野狼： Why is the first pig's house so easy to blow down? (為什麼第一隻豬的房子這麼容易吹倒？)
【進階合作】大野狼： Order the three pigs for me! Who are they? (幫我排列這三隻豬！)
【進階合作】大野狼： Compare the first pig and the third pig's food! (比較第一隻跟第三隻豬吃的東西！)
【進階合作】大野狼： Why didn't the second pig build a brick house? (為什麼第二隻豬不蓋磚頭屋？)
【進階合作】大野狼： Tell me two things about the brick house! (告訴我關於磚頭屋的兩個形容詞！)
【進階合作】大野狼： Where did I go first, and what did I do? (我一開始去哪，做了什麼？)
【進階合作】大野狼： Are the pigs happy in the stick house when I come? Why? (我來的時候他們在木屋裡開心嗎？為什麼？)
【進階合作】大野狼： Who uses money in the best way? What does he buy? (誰用錢用得最聰明？買了什麼？)
【進階合作】大野狼： If the first pig is smart, what will he build? (如果第一隻豬很聰明，他會蓋什麼？)
【進階合作】大野狼： Summarize the story! Are the lazy pigs safe finally? (總結一下！懶豬最後安全嗎？)
【PBL 交易】"I am very hungry! If you don't want me to eat you, what else can I eat?" (如果不吃你們，我能吃什麼？快推薦！)
【PBL 說服】"Give me one very good reason why I shouldn't blow down this brick house!" (給我一個我不該吹垮磚頭屋的好理由！)
【PBL 恐嚇】"Pigs are delicious! Why is eating you a bad idea?" (為什麼吃你們是個壞主意？用你們的食物來證明！)
【PBL 創造】"If you three pigs build a FOURTH house, what new materials will you use and why?" (如果要蓋第四棟，你們會蓋什麼樣的房子？)
【PBL 建議】"The lazy pig lost his house. Give him some advice using your grammar structures!" (給失去房子的懶豬一點建議！)
【PBL 分析】"Who is the real bad guy in the story? Me (the wolf) or the lazy pig?" (誰才是故事裡的壞人？野狼還是懶豬？證明給我聽！)
【PBL 商業】"I have lots of money! Sell me the brick house! Tell me why I should buy it." (把磚頭屋賣給我！說服我為什麼值得買。)
【PBL 合作】"The stick house is broken. How can the second pig and third pig work together now?" (木屋毀了，老二和老三現在可以怎麼合作？)
【PBL 結局】"Make up a new ending! What happens to me, the Big Bad Wolf, finally?" (編一個新結局！大野狼最後怎麼了？)
【PBL 終極和平】"Convince me to stop being a bad wolf and live with you in the brick house!" (說服我不要當壞野狼，和你們一起住在磚頭屋裡！)</textarea>
        <button class="start-btn" onclick="loadQuestions()">✅ 載入題目並進入搶答畫面</button>
    </div>

    <div id="quiz-section">
        
        <div class="top-controls">
            <div>
                <button id="btn-easy" class="btn-active" onclick="setDifficulty('easy')">簡單模式 (每棟10秒)</button>
                <button id="btn-hard" onclick="setDifficulty('hard')">困難模式 (每棟30秒)</button>
                <button style="background-color: #8e44ad;" onclick="backToSetup()">⚙️ 返回編輯題目</button>
            </div>
            
            <div class="health-container">
                <span>班級生命值：</span>
                <button class="icon-btn" onclick="changeHealth(-1)" title="扣一滴血">➖</button>
                <span class="health-display" id="health-display">❤️❤️❤️❤️❤️</span>
                <button class="icon-btn" onclick="changeHealth(1)" title="加一滴血">➕</button>
            </div>
        </div>

        <div class="main-container">
            <div class="question-box">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <h2 id="question-number" style="margin:0; color:#7f8c8d;">題目 1 / 38</h2>
                </div>
                <div class="question-text" id="question-display">
                    點擊下方按鈕開始搶答！
                </div>
                <div>
                    <button onclick="prevQuestion()">⬅️ 上一題</button>
                    <button onclick="nextQuestion()">下一題 ➡️</button>
                    <button style="background-color: #27ae60; float: right; font-weight: bold; padding: 10px 25px;" onclick="startTimer()">🐺 大野狼來了 (開始倒數)</button>
                </div>
            </div>

            <div class="timer-box">
                <div class="houses" id="house-display">
                    <span id="house-1">🛖</span> 
                    <span id="house-2">🪵</span> 
                    <span id="house-3">🧱</span> 
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <div class="time-display">剩餘 <span id="time-left">30</span> 秒</div>
                <div class="wolf-status" id="wolf-status">學生們，請準備！</div>
            </div>
        </div>
    </div>

    <script>
        // === 系統變數 ===
        let questionBank = [];
        let currentQIndex = 0;
        let timePerHouse = 10;
        let totalTime = 30;
        let timeLeft = totalTime;
        let timerInterval;
        let isRunning = false;
        
        // 生命值變數
        const maxHealth = 5;
        let currentHealth = 5;

        const houseIcons = ['🛖', '🪵', '🧱']; 
        const ruinedHouse = '💨🏚️';           

        // === 步驟 1：載入老師輸入的題目 ===
        function loadQuestions() {
            const inputText = document.getElementById('question-input').value;
            // 根據換行符號切割，並過濾掉空白行
            questionBank = inputText.split('\n').filter(q => q.trim() !== '');
            
            if (questionBank.length === 0) {
                alert("老師，您還沒輸入題目喔！");
                return;
            }

            document.getElementById('setup-section').style.display = 'none';
            document.getElementById('quiz-section').style.display = 'flex';
            
            currentQIndex = 0;
            updateQuestionDisplay();
            resetTimerUI();
            
            // 重置生命值
            currentHealth = maxHealth;
            updateHealthDisplay();
        }

        // 返回設定畫面
        function backToSetup() {
            document.getElementById('setup-section').style.display = 'block';
            document.getElementById('quiz-section').style.display = 'none';
            clearInterval(timerInterval);
            isRunning = false;
        }

        // === 步驟 2：切換題目邏輯 ===
        function nextQuestion() {
            if (currentQIndex < questionBank.length - 1) {
                currentQIndex++;
                updateQuestionDisplay();
                resetTimerUI();
            }
        }
        function prevQuestion() {
            if (currentQIndex > 0) {
                currentQIndex--;
                updateQuestionDisplay();
                resetTimerUI();
            }
        }
        function updateQuestionDisplay() {
            document.getElementById('question-number').innerText = `題目 ${currentQIndex + 1} / ${questionBank.length}`;
            document.getElementById('question-display').innerText = questionBank[currentQIndex];
        }

        // === 步驟 3：難度與計時器邏輯 ===
        function setDifficulty(level) {
            document.getElementById('btn-easy').classList.remove('btn-active');
            document.getElementById('btn-hard').classList.remove('btn-active');
            
            if (level === 'easy') {
                timePerHouse = 10;
                document.getElementById('btn-easy').classList.add('btn-active');
            } else {
                timePerHouse = 30;
                document.getElementById('btn-hard').classList.add('btn-active');
            }
            totalTime = timePerHouse * 3;
            resetTimerUI();
        }

        function startTimer() {
            if (isRunning) return;
            resetTimerUI();
            isRunning = true;
            document.getElementById('wolf-status').innerText = "🐺 大野狼開始吹房子了！";
            document.getElementById('wolf-status').style.color = "#E74C3C";

            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerUI();

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    isRunning = false;
                    document.getElementById('wolf-status').innerText = "🚨 房子全倒了！請作答！";
                    document.getElementById('progress-bar').style.backgroundColor = "#E74C3C";
                }
            }, 1000);
        }

        function updateTimerUI() {
            document.getElementById('time-left').innerText = timeLeft;
            
            let elapsed = totalTime - timeLeft;
            let percent = (elapsed / totalTime) * 100;
            document.getElementById('progress-bar').style.width = percent + '%';

            // 判斷房子被吹倒的狀態
            if (elapsed >= timePerHouse * 1) document.getElementById('house-1').innerText = ruinedHouse;
            if (elapsed >= timePerHouse * 2) document.getElementById('house-2').innerText = ruinedHouse;
            if (elapsed >= timePerHouse * 3) document.getElementById('house-3').innerText = ruinedHouse;
        }

        function resetTimerUI() {
            clearInterval(timerInterval);
            isRunning = false;
            timeLeft = totalTime;
            document.getElementById('time-left').innerText = timeLeft;
            document.getElementById('progress-bar').style.width = '0%';
            document.getElementById('progress-bar').style.backgroundColor = "var(--primary-color)";
            document.getElementById('house-1').innerText = houseIcons[0];
            document.getElementById('house-2').innerText = houseIcons[1];
            document.getElementById('house-3').innerText = houseIcons[2];
            document.getElementById('wolf-status').innerText = "學生們，請準備！";
            document.getElementById('wolf-status').style.color = "#555";
        }

        // === 步驟 4：生命值系統邏輯 ===
        function changeHealth(amount) {
            currentHealth += amount;
            if (currentHealth > maxHealth) currentHealth = maxHealth;
            if (currentHealth < 0) currentHealth = 0;
            
            updateHealthDisplay();
        }

        function updateHealthDisplay() {
            let heartsHTML = '';
            for (let i = 0; i < maxHealth; i++) {
                if (i < currentHealth) {
                    heartsHTML += '❤️'; 
                } else {
                    heartsHTML += '🖤'; 
                }
            }
            document.getElementById('health-display').innerText = heartsHTML;
        }
    </script>
</body>
</html>
